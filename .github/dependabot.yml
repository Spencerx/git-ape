updates:
- commit-message:
    include: scope
    prefix: deps(website)
  directory: /website
  groups:
    docusaurus:
      patterns:
      - "@docusaurus/*"
      - docusaurus-*
      update-types:
      - minor
      - patch
    react:
      patterns:
      - react
      - react-dom
      - "@types/react"
      update-types:
      - minor
      - patch
    website-minor-patch:
      exclude-patterns:
      - "@docusaurus/*"
      - docusaurus-*
      - react
      - react-dom
      - "@types/react"
      patterns:
      - "*"
      update-types:
      - minor
      - patch
  labels:
  - dependencies
  - website
  open-pull-requests-limit: 5
  package-ecosystem: npm
  schedule:
    day: monday
    interval: weekly
    time: "06:00"
    timezone: Etc/UTC
- commit-message:
    include: scope
    prefix: deps(actions)
  directory: /
  groups:
    github-actions:
      patterns:
      - "*"
  ignore:
  - dependency-name: "github/gh-aw-actions/**" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  labels:
  - dependencies
  - github-actions
  open-pull-requests-limit: 3
  package-ecosystem: github-actions
  schedule:
    day: monday
    interval: weekly
    time: "06:00"
    timezone: Etc/UTC
version: 2
