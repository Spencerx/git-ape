# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/waza/main/schemas/task.schema.json

id: negative-naming-question
name: Negative — CAF naming lookup with overlapping vocabulary (azure-naming-research territory)
description: A CAF naming-constraint question phrased with vocabulary that overlaps the policy-advisor description ("resource governance compliance"). After SKILL.md gains an explicit `When NOT to Use` section listing `azure-naming-research`, the heuristic trigger should score <0.50 despite the vocabulary overlap. Reverted to original harder wording in #158 (see PR #157 history for the gentler interim wording).
# See positive-after-template-generation.yaml for `mutable-by-*` tag semantics.
tags: [trigger, negative, mutable-by-skill]
inputs:
  prompt: |
    We need to review naming conventions for our cloud resources to ensure
    governance compliance. What's the right CAF-compliant name format for
    Azure resource types? Specifically I need to know the abbreviation
    prefix and length constraint for a Key Vault.
graders:
  - name: trigger_relevance_negative
    type: trigger
    config:
      skill_path: .github/skills/azure-policy-advisor/SKILL.md
      mode: negative
      threshold: 0.65

