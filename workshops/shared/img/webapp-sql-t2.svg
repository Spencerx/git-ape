<g font-family="Segoe UI,system-ui,sans-serif">
<rect x="190" y="20" width="180" height="50" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.22)" stroke-dasharray="4 3"/>
