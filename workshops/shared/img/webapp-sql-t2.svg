<text x="465" y="268" text-anchor="middle" fill="#fff8d6" font-size="9">via Managed Identity</text>
<text x="280" y="320" text-anchor="middle" fill="#c0cad7" font-size="10" font-style="italic">Every link uses Managed Identity &#8212; zero connection strings</text>
