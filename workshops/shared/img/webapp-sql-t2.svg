<text x="280" y="124" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Web App</text>
<text x="280" y="142" text-anchor="middle" fill="#e8e2ff" font-size="10">.NET on App Service</text>
<text x="280" y="156" text-anchor="middle" fill="#FFD700" font-size="9" font-weight="700">+ Managed Identity</text>
