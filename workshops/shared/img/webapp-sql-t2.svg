<linearGradient id="sql" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0F9ED5"/><stop offset="100%" stop-color="#156082"/></linearGradient>
<linearGradient id="kv" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E97132"/><stop offset="100%" stop-color="#B14E1F"/></linearGradient>
<linearGradient id="ai" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFC000"/><stop offset="100%" stop-color="#B5860A"/></linearGradient>
<marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#FFD700"/></marker>
