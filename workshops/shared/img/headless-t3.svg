<svg viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">
<defs>
<linearGradient id="iss" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#667eea"/><stop offset="100%" stop-color="#764ba2"/></linearGradient>
<linearGradient id="agt" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b9df0"/><stop offset="100%" stop-color="#5a6ed1"/></linearGradient>
<linearGradient id="pr" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0F9ED5"/><stop offset="100%" stop-color="#156082"/></linearGradient>
<linearGradient id="dep" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#4EA72E"/><stop offset="100%" stop-color="#2D6E1B"/></linearGradient>
<marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#FFD700"/></marker>
</defs>
<g font-family="Segoe UI,system-ui,sans-serif">
<rect x="20" y="100" width="100" height="64" rx="12" fill="url(#iss)" stroke="rgba(255,255,255,0.3)"/>
<text x="70" y="125" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Issue</text>
<text x="70" y="143" text-anchor="middle" fill="#e8e2ff" font-size="9">"deploy a</text>
<text x="70" y="155" text-anchor="middle" fill="#e8e2ff" font-size="9">function app"</text>
<rect x="155" y="100" width="120" height="64" rx="12" fill="url(#agt)" stroke="rgba(255,255,255,0.3)"/>
<text x="215" y="123" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Coding Agent</text>
<text x="215" y="141" text-anchor="middle" fill="#e8e2ff" font-size="10">generates ARM</text>
<text x="215" y="154" text-anchor="middle" fill="#e8e2ff" font-size="9">on a branch</text>
<rect x="310" y="100" width="120" height="64" rx="12" fill="url(#pr)" stroke="rgba(255,255,255,0.3)"/>
<text x="370" y="123" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">PR opened</text>
<text x="370" y="141" text-anchor="middle" fill="#d6eef8" font-size="10">plan posted</text>
<text x="370" y="154" text-anchor="middle" fill="#d6eef8" font-size="9">as PR comment</text>
<rect x="465" y="60" width="120" height="64" rx="12" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.25)"/>
<text x="525" y="83" text-anchor="middle" fill="#FFD700" font-size="12" font-weight="700">Reviewer</text>
<text x="525" y="101" text-anchor="middle" fill="#c0cad7" font-size="10">approves PR</text>
<text x="525" y="114" text-anchor="middle" fill="#c0cad7" font-size="9">(human gate)</text>
<rect x="465" y="160" width="120" height="64" rx="12" fill="url(#dep)" stroke="rgba(255,255,255,0.3)"/>
<text x="525" y="183" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Deploy</text>
<text x="525" y="201" text-anchor="middle" fill="#d8efce" font-size="10">on merge</text>
<text x="525" y="214" text-anchor="middle" fill="#d8efce" font-size="9">result &#8594; comment</text>
<text x="300" y="42" text-anchor="middle" fill="#FFD700" font-size="14" font-weight="700">From GitHub Issue to Deployed Infrastructure</text>
<text x="300" y="260" text-anchor="middle" fill="#c0cad7" font-size="10" font-style="italic">No engineer typed an ARM template &#8212; humans only review and approve</text>
</g>
<line x1="120" y1="132" x2="151" y2="132" stroke="#FFD700" stroke-width="2" marker-end="url(#ar)"/>
<line x1="275" y1="132" x2="306" y2="132" stroke="#FFD700" stroke-width="2" marker-end="url(#ar)"/>
<line x1="430" y1="120" x2="461" y2="95" stroke="#FFD700" stroke-width="2" marker-end="url(#ar)"/>
<line x1="525" y1="125" x2="525" y2="156" stroke="#FFD700" stroke-width="2" marker-end="url(#ar)"/>
</svg>