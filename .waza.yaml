# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/waza/main/schemas/config.schema.json

# Waza configuration for Azure/git-ape.
#
# Skills live under .github/skills/ (existing layout — not touched).
# Eval suites live under .github/evals/ alongside them.
# Run results land under .waza-results/ (gitignored).

paths:
  skills: .github/skills/
  evals: .github/evals/
  results: .waza-results/

defaults:
  engine: copilot-sdk
  model: claude-sonnet-4.6
  timeout: 300
  parallel: true
  workers: 4
  verbose: false
  sessionLog: false

cache:
  enabled: true
  dir: .waza-cache

dev:
  model: claude-sonnet-4.6
  target: medium-high
  maxIterations: 5

tokens:
  # Aspirational token caps for new SKILL.md files. These are intentionally
  # tighter than today's corpus (13 skills as of 2026-05, p75 ≈ 3.2k tokens) —
  # the goal is to push NEW skills to fit comfortably in agent context, while
  # existing oversize skills are gradually trimmed via /skill-improve.
  # Re-evaluate once the skill corpus stabilises: `waza tokens count
  # .github/skills/ --format json | jq '[.files|to_entries[]|
  # select(.key|endswith("/SKILL.md"))|.value.tokens]|sort'`.
  warningThreshold: 1000
  # Hard fallback ceiling enforced by `waza tokens compare --strict`.
  # Tightened in Wave 3b from 1500 → 1300 (1.3× warningThreshold) to narrow
  # the gap between "warn" and "block" for new skills.
  fallbackLimit: 1300

graders:
  programTimeout: 30
