# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/waza/main/schemas/config.schema.json

# Waza configuration for Azure/git-ape.
#
# Skills live under .github/skills/ (existing layout — not touched).
# Eval suites live under .github/evals/ alongside them.
# Run results land under .waza-results/ (gitignored).

paths:
  skills: .github/skills/
  evals: .github/evals/
  results: .waza-results/

defaults:
  engine: copilot-sdk
  model: claude-sonnet-4.6
  timeout: 300
  parallel: true
  workers: 4
  verbose: false
  sessionLog: false

cache:
  enabled: true
  dir: .waza-cache

dev:
  model: claude-sonnet-4.6
  target: medium-high
  maxIterations: 5

tokens:
  # Calibrated from `waza tokens count .github/skills/ --format json` (Wave 1):
  # 75th-percentile token count across all 34 skills, rounded up to nearest 50,
  # capped at 1000. Re-run the calibration if the skill set materially changes.
  warningThreshold: 1000
  # Hard fallback ceiling enforced by `waza tokens compare --strict`.
  # Tightened in Wave 3b from 1500 → 1300 (1.3× warningThreshold) to narrow
  # the gap between "warn" and "block" for new skills.
  fallbackLimit: 1300

graders:
  programTimeout: 30
